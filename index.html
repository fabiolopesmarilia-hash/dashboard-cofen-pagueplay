<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COB COFEN - Dashboard & Agenda Viva</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00A86B; --bg: #F0F4F8; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .header-top { background: var(--white); padding: 10px 20px; display: flex; justify-content: space-between; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; background: var(--primary); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 12px; }
        .day { padding: 10px 5px; background: #f9f9f9; border-radius: 5px; }
        .day.passed { background: #C8E6C9; color: #2E7D32; }
        .day.today { background: var(--primary); color: white; }
        .agenda-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #lista-agenda { list-style: none; padding: 0; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .item-agenda { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 5px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

<div class="header-top">
    <div><strong>📊 COB COFEN</strong> | DASHBOARD MARÇO 2026</div>
    <div style="color: var(--primary); font-weight: 800;">Terça-feira, 24/03/2026</div>
</div>

<div class="main-grid">
    <div class="card">
        <h3>📈 DIÁRIO GLOBAL — PAGUEPLAY</h3>
        <div style="height: 350px; background: #fdfdfd; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; color: #ccc;">
            [Gráfico de Performance Ativo]
        </div>
    </div>

    <div>
        <div class="stats-row">
            <div><h4>D.U.</h4><p>22</p></div>
            <div><h4>PASSADOS</h4><p>17</p></div>
            <div><h4>RESTAM</h4><p>5</p></div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <h3>Março 2026</h3>
            <div class="calendar-grid">
                <div style="color:red">D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div style="color:red">S</div>
                <div class="day">1</div><div class="day passed">2</div><div class="day passed">3</div><div class="day passed">4</div><div class="day passed">5</div><div class="day passed">6</div><div class="day">7</div>
                <div class="day">8</div><div class="day passed">9</div><div class="day passed">10</div><div class="day passed">11</div><div class="day passed">12</div><div class="day passed">13</div><div class="day">14</div>
                <div class="day">15</div><div class="day passed">16</div><div class="day passed">17</div><div class="day passed">18</div><div class="day passed">19</div><div class="day passed">20</div><div class="day">21</div>
                <div class="day">22</div><div class="day passed">23</div><div class="day today">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div>
            </div>
        </div>

        <div class="card">
            <h3>📅 Agenda em Tempo Real</h3>
            <input type="text" id="feedback-txt" class="agenda-input" placeholder="Feedback ou Reunião">
            <input type="time" id="feedback-time" class="agenda-input">
            <button class="btn-add" onclick="salvarAgenda()">ADICIONAR PARA TODOS</button>
            <ul id="lista-agenda"></ul>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMTACDGFs6C6imdOUewRsbYex3o0PLXEA",
        authDomain: "pagueplay-e30df.firebaseapp.com",
        projectId: "pagueplay-e30df",
        databaseURL: "https://pagueplay-e30df-default-rtdb.firebaseio.com",
        storageBucket: "pagueplay-e30df.firebasestorage.app",
        messagingSenderId: "965902865447",
        appId: "1:965902865447:web:a78ddeeec26f736cd2ea02"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function salvarAgenda() {
        const txt = document.getElementById('feedback-txt').value;
        const hr = document.getElementById('feedback-time').value;
        if(!txt || !hr) return alert("Preencha tudo!");

        database.ref('agenda_global').push({ texto: txt, hora: hr });
        document.getElementById('feedback-txt').value = "";
    }

    database.ref('agenda_global').on('value', (snapshot) => {
        const lista = document.getElementById('lista-agenda');
        lista.innerHTML = "";
        snapshot.forEach((item) => {
            const val = item.val();
            const li = document.createElement('li');
            li.className = 'item-agenda';
            li.innerHTML = `<span><strong>${val.hora}</strong> - ${val.texto}</span> <button onclick="remover('${item.key}')" style="border:none; background:none; color:red; cursor:pointer">X</button>`;
            lista.prepend(li);
        });
    });

    function remover(key) { database.ref('agenda_global').child(key).remove(); }
</script>
</body>
</html>
