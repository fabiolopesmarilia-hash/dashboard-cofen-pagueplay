<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>COB COFEN - Gestão em Tempo Real</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #00A86B; --bg: #F0F4F8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .item-agenda { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📅 Agenda Compartilhada (PaguePlay)</h2>
        <p><small>Sincronizado entre Marília e outras bases.</small></p>
        
        <div style="display: flex; flex-direction: column;">
            <input type="text" id="evento" placeholder="Ex: Feedback Brenda - Operador X">
            <input type="time" id="hora">
            <button class="btn-add" onclick="salvarEvento()">AGENDAR PARA TODOS</button>
        </div>

        <ul id="lista-eventos" style="list-style:none; padding:0; margin-top:20px;">
            </ul>
    </div>

<script>
    // CONFIGURAÇÃO DO FIREBASE (Cole seus dados aqui para sincronizar entre cidades)
    const firebaseConfig = {
        apiKey: "COLE_AQUI_SUA_API_KEY",
        authDomain: "seu-projeto.firebaseapp.com",
        databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
        projectId: "seu-projeto",
        storageBucket: "seu-projeto.appspot.com",
        messagingSenderId: "00000000",
        appId: "1:00000000:web:0000000"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Função para salvar que envia para a nuvem
    function salvarEvento() {
        const txt = document.getElementById('evento').value;
        const hr = document.getElementById('hora').value;
        if(!txt || !hr) return alert("Preencha tudo!");

        database.ref('agenda').push({
            texto: txt,
            hora: hr,
            dataEnvio: Date.now()
        });
        
        document.getElementById('evento').value = "";
    }

    // FUNÇÃO MÁGICA: Escuta a nuvem. Se alguém mudar em outra cidade, atualiza aqui na hora!
    database.ref('agenda').on('value', (snapshot) => {
        const lista = document.getElementById('lista-eventos');
        lista.innerHTML = "";
        snapshot.forEach((item) => {
            const data = item.val();
            const li = document.createElement('li');
            li.className = 'item-agenda';
            li.innerHTML = `<span><strong>${data.hora}</strong> - ${data.texto}</span>`;
            lista.appendChild(li);
        });
    });
</script>

</body>
</html>
